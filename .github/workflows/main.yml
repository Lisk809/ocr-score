name: OMR - Convert Sheet Music to MusicXML

on:
  push:
    paths:
      - 'scores/**/*.jpg'
      - 'scores/**/*.jpeg'
      - 'scores/**/*.png'
      - 'scores/**/*.pdf'
  workflow_dispatch:
    inputs:
      input_file:
        description: '输入文件路径 (相对于仓库根目录)'
        required: false
        default: ''

env:
  INPUT_DIR: scores
  OUTPUT_DIR: musicxml_output

jobs:
  convert-to-musicxml:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract5 libtiff6 libjpeg8 libpng16-16

      - name: Extract and install Audiveris from .deb (skip postinst)
        run: |
          wget https://github.com/Audiveris/audiveris/releases/download/5.10.2/Audiveris-5.10.2-ubuntu24.04-x86_64.deb
          ar x Audiveris-5.10.2-ubuntu24.04-x86_64.deb data.tar.xz
          sudo tar -xf data.tar.xz -C /
          # 验证安装
          if [ -f /usr/bin/Audiveris ]; then
            echo "Audiveris installed successfully"
          else
            echo "Audiveris not found in /usr/bin"
            find / -name Audiveris -type f 2>/dev/null
            exit 1
          fi

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Convert to MusicXML
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.input_file }}" ]]; then
            INPUT_FILE="${{ github.event.inputs.input_file }}"
            if [[ -f "$INPUT_FILE" ]]; then
              echo "Processing: $INPUT_FILE"
              /usr/bin/Audiveris -batch -input "$INPUT_FILE" -output ${{ env.OUTPUT_DIR }} -export MusicXML
            else
              echo "Error: File not found: $INPUT_FILE"
              exit 1
            fi
          else
            for ext in jpg jpeg png pdf; do
              for file in ${{ env.INPUT_DIR }}/*.$ext; do
                if [[ -f "$file" ]]; then
                  echo "Processing: $file"
                  /usr/bin/Audiveris -batch -input "$file" -output ${{ env.OUTPUT_DIR }} -export MusicXML
                fi
              done
            done
          fi

      - name: Upload MusicXML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicxml-output
          path: ${{ env.OUTPUT_DIR }}/*.musicxml
          if-no-files-found: warn