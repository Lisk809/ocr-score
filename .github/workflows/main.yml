name: OMR - Convert Sheet Music to MusicXML

on:
  push:
    paths:
      - 'scores/**/*.jpg'
      - 'scores/**/*.jpeg'
      - 'scores/**/*.png'
      - 'scores/**/*.pdf'
  workflow_dispatch:
    inputs:
      input_file:
        description: '输入文件路径 (相对于仓库根目录)'
        required: false
        default: ''

env:
  INPUT_DIR: scores
  OUTPUT_DIR: musicxml_output
  AUDIVERIS_PATH: /opt/audiveris/bin/Audiveris

jobs:
  convert-to-musicxml:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract5 libtiff6 libjpeg8 libpng16-16 zstd

      - name: Extract and install Audiveris from .deb
        run: |
          wget https://github.com/Audiveris/audiveris/releases/download/5.10.2/Audiveris-5.10.2-ubuntu24.04-x86_64.deb
          ar x Audiveris-5.10.2-ubuntu24.04-x86_64.deb
          DATA_FILE=$(ls data.tar.* 2>/dev/null | head -1)
          if [[ -z "$DATA_FILE" ]]; then
            echo "No data.tar.* file found"
            exit 1
          fi
          echo "Found $DATA_FILE"
          if [[ "$DATA_FILE" == *.xz ]]; then
            sudo tar -xf "$DATA_FILE" -C /
          elif [[ "$DATA_FILE" == *.zst ]]; then
            sudo tar --zstd -xf "$DATA_FILE" -C /
          else
            sudo tar -xf "$DATA_FILE" -C /
          fi
          if [[ -f "${{ env.AUDIVERIS_PATH }}" ]]; then
            echo "Audiveris installed at ${{ env.AUDIVERIS_PATH }}"
          else
            echo "Error: Audiveris not found at expected location"
            find /opt -name Audiveris -type f 2>/dev/null || echo "Not found"
            exit 1
          fi

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Convert to MusicXML
        shell: bash
        run: |
          export LD_LIBRARY_PATH=/opt/audiveris/lib:$LD_LIBRARY_PATH
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.input_file }}" ]]; then
            INPUT_FILE="${{ github.event.inputs.input_file }}"
            if [[ -f "$INPUT_FILE" ]]; then
              echo "Processing: $INPUT_FILE"
              ${{ env.AUDIVERIS_PATH }} -batch "$INPUT_FILE" -output ${{ env.OUTPUT_DIR }} -export
            else
              echo "Error: File not found: $INPUT_FILE"
              exit 1
            fi
          else
            for ext in jpg jpeg png pdf; do
              for file in ${{ env.INPUT_DIR }}/*.$ext; do
                if [[ -f "$file" ]]; then
                  echo "Processing: $file"
                  ${{ env.AUDIVERIS_PATH }} -batch "$file" -output ${{ env.OUTPUT_DIR }} -export
                fi
              done
            done
          fi

      - name: Upload MusicXML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicxml-output
          path: ${{ env.OUTPUT_DIR }}/*.musicxml
          if-no-files-found: warn