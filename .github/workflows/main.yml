name: OMR - Convert Sheet Music to MusicXML

on:
  push:
    paths:
      - 'scores/**/*.jpg'
      - 'scores/**/*.jpeg'
      - 'scores/**/*.png'
      - 'scores/**/*.pdf'
  workflow_dispatch:
    inputs:
      input_file:
        description: '输入文件路径 (相对于仓库根目录)'
        required: false
        default: ''

env:
  INPUT_DIR: scores
  OUTPUT_DIR: musicxml_output

jobs:
  convert-to-musicxml:
    runs-on: ubuntu-24.04   # 匹配 .deb 包的系统版本

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Audiveris from provided .deb
        run: |
          wget https://github.com/Audiveris/audiveris/releases/download/5.10.2/Audiveris-5.10.2-ubuntu24.04-x86_64.deb
          sudo dpkg -i Audiveris-5.10.2-ubuntu24.04-x86_64.deb || sudo apt-get install -f -y

      - name: Create output directory
        run: mkdir -p ${{ env.OUTPUT_DIR }}

      - name: Convert to MusicXML
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.input_file }}" ]]; then
            INPUT_FILE="${{ github.event.inputs.input_file }}"
            if [[ -f "$INPUT_FILE" ]]; then
              echo "Processing: $INPUT_FILE"
              Audiveris -batch -input "$INPUT_FILE" -output ${{ env.OUTPUT_DIR }} -export MusicXML
            else
              echo "Error: File not found: $INPUT_FILE"
              exit 1
            fi
          else
            for ext in jpg jpeg png pdf; do
              for file in ${{ env.INPUT_DIR }}/*.$ext; do
                if [[ -f "$file" ]]; then
                  echo "Processing: $file"
                  Audiveris -batch -input "$file" -output ${{ env.OUTPUT_DIR }} -export MusicXML
                fi
              done
            done
          fi

      - name: Upload MusicXML artifacts
        uses: actions/upload-artifact@v4
        with:
          name: musicxml-output
          path: ${{ env.OUTPUT_DIR }}/*.musicxml
          if-no-files-found: warn